<!doctype html>
<!--
  OG 이미지(public/og-default.png) 생성 소스.
  문구를 바꾸면 아래 명령으로 다시 렌더한다:

  "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
    --headless=new --disable-gpu --window-size=1200,630 --hide-scrollbars \
    --virtual-time-budget=8000 \
    --screenshot=public/og-default.png docs/og-template.html
-->
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: "Pretendard Variable", Pretendard, -apple-system, system-ui, sans-serif;
    background: #ffffff;
    display: flex;
    flex-direction: column;
  }
  .bar { height: 10px; background: #3b5bdb; }
  .inner {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 96px;
  }
  .overline {
    font-size: 26px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: #6b7684;
    margin-bottom: 28px;
  }
  h1 {
    font-size: 54px;
    line-height: 1.42;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: #191f28;
  }
  .site {
    position: absolute;
    left: 96px;
    bottom: 64px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 24px;
    color: #6b7684;
  }
</style>
</head>
<body>
  <div class="bar"></div>
  <div class="inner">
    <p class="overline">강민수 · Minsu Kang</p>
    <h1>LLM 에이전트와 ML 시스템을 만들고,<br />실제로 돌아가는 서비스로 배포합니다.</h1>
  </div>
  <p class="site">minsu5452.github.io</p>
</body>
</html>
